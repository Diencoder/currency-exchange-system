<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart - Digital Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/discovery.css">
</head>
<body class="dark-mode">
    <div class="mobile-frame">
        <!-- Header Section Optimized -->
        <header class="header">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search for services or tools...">
            </div>
        </header>

        <!-- Category Tabs -->
        <div class="categories">
            <button class="cat-tab">Streaming</button>
            <button class="cat-tab active">Design</button>
            <button class="cat-tab">Gaming</button>
            <button class="cat-tab">VCC</button>
        </div>

        <!-- Product List -->
        <main class="product-list">
            <div class="product-grid">
                <!-- Canva Card -->
                <div class="glass-card">
                    <div class="card-image design-bg">
                        <i class="fas fa-palette" style="font-size: 40px; color: white;"></i>
                        <div class="rating-badge"><i class="fas fa-star"></i> 4.9</div>
                    </div>
                    <div class="card-body">
                        <h3>Canva Pro - Premium Design</h3>
                        <p class="price-tag">249.000đ<span>/month</span></p>
                        <div class="seller-info">
                            <i class="fas fa-check-circle trusted"></i>
                            <span>TRUSTED Seller</span>
                        </div>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>

                <!-- Capcut Card -->
                <div class="glass-card">
                    <div class="card-image video-bg">
                        <i class="fas fa-video" style="font-size: 40px; color: white;"></i>
                        <div class="rating-badge"><i class="fas fa-star"></i> 4.8</div>
                    </div>
                    <div class="card-body">
                        <h3>CapCut Pro - Video Editing</h3>
                        <p class="price-tag">199.000đ<span>/month</span></p>
                        <div class="seller-info">
                            <i class="fas fa-check-circle trusted"></i>
                            <span>TRUSTED Seller</span>
                        </div>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>

                <!-- Adobe Card -->
                <div class="glass-card">
                    <div class="card-image adobe-bg">
                        <i class="fab fa-adobe" style="font-size: 40px; color: white;"></i>
                        <div class="rating-badge"><i class="fas fa-star"></i> 4.9</div>
                    </div>
                    <div class="card-body">
                        <h3>Adobe CC - Full Apps</h3>
                        <p class="price-tag">450.000đ<span>/month</span></p>
                        <div class="seller-info">
                            <i class="fas fa-user-shield"></i>
                            <span>VERIFIED</span>
                        </div>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>

                <!-- Spotify Card -->
                <div class="glass-card">
                    <div class="card-image music-bg">
                        <i class="fab fa-spotify" style="font-size: 40px; color: white;"></i>
                        <div class="rating-badge"><i class="fas fa-star"></i> 4.7</div>
                    </div>
                    <div class="card-body">
                        <h3>Spotify Premium - No Ads</h3>
                        <p class="price-tag">59.000đ<span>/month</span></p>
                        <div class="seller-info">
                            <i class="fas fa-check-circle trusted"></i>
                            <span>TRUSTED Seller</span>
                        </div>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>
            <!-- Entertainment Section -->
            <div class="entertainment-section" style="grid-column: span 2; margin-top: 10px;">
                <div class="glass-card featured-game" style="background: linear-gradient(135deg, rgba(240, 185, 11, 0.1), rgba(14, 203, 129, 0.1)); border: 1px solid var(--primary);">
                    <div style="display: flex; align-items: center; gap: 15px; padding: 5px;">
                        <div class="game-icon" style="font-size: 40px; color: var(--primary);">
                            <i class="fas fa-gamepad"></i>
                        </div>
                        <div style="flex-grow: 1;">
                            <h3 style="margin: 0; font-size: 16px;">Mini Game: RPS</h3>
                            <p style="margin: 3px 0; font-size: 11px; color: var(--text-secondary);">Play Rock Paper Scissors & Chill</p>
                        </div>
                        <a href="game-rps.html" class="add-btn" style="width: auto; padding: 8px 20px; background: var(--primary); color: black; text-decoration: none; border-radius: 12px; font-weight: 700;">PLAY</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
