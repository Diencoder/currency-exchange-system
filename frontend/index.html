<!DOCTYPE html>

<head>

    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>

<body>
    <div id="app"></div>
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Inline debug: runs immediately, before ES modules -->
    <script>
        document.getElementById('app').innerHTML = '<div style="color:white;padding:20px;font-family:sans-serif;">⏳ Initializing scripts...</div>';
        window.onerror = function(msg, src, line, col, err) {
            document.getElementById('app').innerHTML = '<div style="color:red;padding:20px;font-family:sans-serif;white-space:pre-wrap;"><b>❌ JavaScript Error</b><br>' + msg + '<br>File: ' + src + '<br>Line: ' + line + '</div>';
            return false;
        };
    </script>

    <!-- Entry Script (ES Module) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
