version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  mysql:
    image: mysql:8.0
    container_name: currency-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./perfect_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - currency-network

  redis:
    image: redis:alpine
    container_name: currency-redis
    ports:
      - "6379:6379"
    networks:
      - currency-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: currency-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - currency-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: currency-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - currency-network

  # --- CORE SERVICES ---
  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - currency-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
    networks:
      - currency-network

  # --- BUSINESS SERVICES ---
  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - mysql
      - kafka
      - discovery-service
    networks:
      - currency-network

  exchange-service:
    build: ./exchange-service
    container_name: exchange-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/exchange_db?createDatabaseIfNotExist=true
      - SPRING_REDIS_HOST=redis
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - mysql
      - redis
      - discovery-service
    networks:
      - currency-network

  transaction-service:
    build: ./transaction-service
    container_name: transaction-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/transaction_db?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - mysql
      - kafka
      - discovery-service
    networks:
      - currency-network

  p2p-service:
    build: ./p2p-service
    container_name: p2p-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/p2p_db?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - mysql
      - kafka
      - discovery-service
    networks:
      - currency-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - kafka
      - discovery-service
    networks:
      - currency-network

  # --- FRONTEND ---
  frontend:
    build: ./frontend
    container_name: currency-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - currency-network

networks:
  currency-network:
    driver: bridge
